<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeatherEats | 오늘 뭐 먹지?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body data-page="home" class="theme-default">
  <div class="app-shell">
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html" aria-label="WeatherEats 홈">
          <span class="brand-mark">🍽️</span>
          <span class="brand-text">WeatherEats</span>
        </a>
        <nav class="header-nav" aria-label="주요 메뉴">
          <button id="refresh-location-button" class="button button-ghost" type="button">위치변경</button>
          <a class="button button-ghost" href="favorites.html">즐겨찾기</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero-section">
        <div class="container hero-grid">
          <div class="panel panel-hero">
            <div id="home-status" class="status-banner" aria-live="polite"></div>
            <div class="hero-copy">
              <p class="eyebrow">오늘 날씨로 고르는 한 끼</p>
              <h1 class="page-title">지금 날씨에 딱 맞는 맛집을 찾아보세요.</h1>
              <p class="page-description">현재 위치의 날씨를 분석해 오늘 어울리는 메뉴를 추천하고, 주변 맛집을 지도와 함께 바로 검색해요.</p>
              <div class="hero-actions">
                <a class="button button-primary button-hero" data-nearby-search-link href="search.html?keyword=%EB%A7%9B%EC%A7%91">내 주변 맛집 찾기</a>
                <button id="hero-refresh-button" class="button button-ghost button-hero" type="button">지금 위치 다시 불러오기</button>
              </div>
              <div class="hero-points" aria-label="서비스 특징">
                <span class="hero-point">📍 위치 기반 추천</span>
                <span class="hero-point">🌦️ 날씨 맞춤 메뉴</span>
                <span class="hero-point">⭐ 즐겨찾기 저장</span>
              </div>
            </div>
            <div id="manual-location-panel" class="manual-location-panel"></div>
          </div>

          <section id="weather-card" class="panel weather-card" aria-labelledby="weather-heading">
            <div class="skeleton-block skeleton-block-lg"></div>
          </section>
        </div>
      </section>

      <section class="section-block">
        <div class="container">
          <div class="section-heading">
            <div>
              <p class="section-kicker">추천 메뉴</p>
              <h2 class="section-title">오늘의 추천 메뉴</h2>
            </div>
            <a class="button button-secondary" data-nearby-search-link href="search.html?keyword=%EB%A7%9B%EC%A7%91">직접 검색하기</a>
          </div>
          <div id="recommendation-list" class="recommendation-grid" aria-live="polite"></div>
        </div>
      </section>

      <section class="section-block section-muted">
        <div class="container">
          <div class="section-heading section-heading-inline">
            <div>
              <p class="section-kicker">주간 날씨</p>
              <h2 class="section-title">이번 주 날씨 미리보기</h2>
            </div>
            <p class="section-caption">날씨 변화를 보고 미리 메뉴를 골라보세요.</p>
          </div>
          <div id="forecast-list" class="forecast-grid" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <nav class="mobile-bottom-nav" aria-label="하단 메뉴">
      <a class="mobile-bottom-link is-current" href="index.html">
        <span class="mobile-bottom-icon">🏠</span>
        <span class="mobile-bottom-text">홈</span>
      </a>
      <a class="mobile-bottom-link" data-nearby-search-link href="search.html?keyword=%EB%A7%9B%EC%A7%91">
        <span class="mobile-bottom-icon">🔎</span>
        <span class="mobile-bottom-text">검색</span>
      </a>
      <a class="mobile-bottom-link" href="favorites.html">
        <span class="mobile-bottom-icon">⭐</span>
        <span class="mobile-bottom-text">저장</span>
      </a>
    </nav>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p>© 2026 WeatherEats</p>
        <a href="https://github.com/tmdry4530/kosta-ajax" target="_blank" rel="noreferrer">GitHub</a>
      </div>
    </footer>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="js/config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/kakao.js"></script>
  <script src="js/main.js"></script>
</body>
</html>

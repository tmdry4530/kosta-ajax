<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeatherEats | 맛집 검색</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/search.css">
</head>

<body data-page="search" class="theme-default">
  <div class="app-shell">
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html" aria-label="WeatherEats 홈">
          <span class="brand-mark">🍽️</span>
          <span class="brand-text">WeatherEats</span>
        </a>
        <nav class="header-nav" aria-label="주요 메뉴">
          <a class="button button-ghost" href="index.html">홈</a>
          <a class="button button-ghost" href="favorites.html">즐겨찾기</a>
        </nav>
      </div>
    </header>

    <main class="section-block search-main">
      <div class="container search-layout">
        <section class="panel search-controls-panel">
          <div id="search-status" class="status-banner" aria-live="polite"></div>
          <form id="search-form" class="search-form" autocomplete="off">
            <label class="visually-hidden" for="search-input">검색어</label>
            <input id="search-input" class="search-input" type="text" name="keyword" placeholder="예: 국밥, 파전, 브런치"
              required>
            <button class="button button-primary" type="submit">검색</button>
            <button id="nearby-button" class="button button-secondary" type="button">내 주변 3km</button>
          </form>
          <div id="manual-search-location" class="manual-location-panel"></div>
          <div class="filter-group" aria-label="카테고리 필터">
            <button class="filter-chip is-active" type="button" data-filter="all">전체</button>
            <button class="filter-chip" type="button" data-filter="한식">한식</button>
            <button class="filter-chip" type="button" data-filter="중식">중식</button>
            <button class="filter-chip" type="button" data-filter="일식">일식</button>
            <button class="filter-chip" type="button" data-filter="양식">양식</button>
            <button class="filter-chip" type="button" data-filter="카페">카페</button>
          </div>
          <div class="search-utility-bar" aria-label="검색 보조 옵션">
            <label class="search-select-group search-select-group-compact" for="sort-filter">
              <span class="search-select-label">정렬</span>
              <select id="sort-filter" class="search-select">
                <option value="distance">거리순</option>
                <option value="name">이름순</option>
                <option value="category">카테고리순</option>
              </select>
            </label>
            <!-- <label class="search-select-group" for="travel-mode">
              <span class="search-select-label">이동</span>
              <select id="travel-mode" class="search-select">
                <option value="walk">도보</option>
                <option value="car">차량</option>
              </select>
            </label> -->
          </div>
          <div id="recent-searches" class="recent-searches" aria-live="polite"></div>
        </section>

        <section class="search-content-grid">
          <div class="panel map-panel">
            <div class="map-panel-header">
              <div>
                <p class="section-kicker">지도</p>
                <h1 class="section-title">주변 맛집 탐색</h1>
              </div>
              <p id="map-summary" class="section-caption">검색어를 입력하면 결과가 지도와 함께 표시됩니다.</p>
            </div>
            <div id="map" class="map-canvas" role="application" aria-label="맛집 지도"></div>
          </div>

          <div class="panel results-panel">
            <div class="results-header">
              <div>
                <p class="section-kicker">검색 결과</p>
                <h2 class="section-title">주변 맛집 리스트</h2>
              </div>
              <div class="results-meta">
                <p id="results-count" class="results-count">검색 결과를 불러오는 중입니다.</p>
                <p id="search-data-note" class="section-caption">Kakao Local API 기준 · 검색 전</p>
              </div>
              <button id="results-toggle" class="button button-ghost results-toggle" type="button" aria-expanded="true"
                aria-controls="results-panel-body">
                리스트 접기
              </button>
            </div>
            <div id="results-panel-body" class="results-panel-body">
              <div id="results-list" class="results-list" aria-live="polite"></div>
              <nav id="pagination" class="pagination" aria-label="검색 결과 페이지"></nav>
            </div>
          </div>
        </section>
      </div>
    </main>

    <nav class="mobile-bottom-nav" aria-label="하단 메뉴">
      <a class="mobile-bottom-link" href="index.html">
        <span class="mobile-bottom-icon">🏠</span>
        <span class="mobile-bottom-text">홈</span>
      </a>
      <a class="mobile-bottom-link is-current" href="search.html?keyword=%EB%A7%9B%EC%A7%91">
        <span class="mobile-bottom-icon">🔎</span>
        <span class="mobile-bottom-text">검색</span>
      </a>
      <a class="mobile-bottom-link" href="favorites.html">
        <span class="mobile-bottom-icon">⭐</span>
        <span class="mobile-bottom-text">저장</span>
      </a>
    </nav>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p>© 2026 WeatherEats</p>
        <a href="https://github.com/tmdry4530/kosta-ajax">GitHub</a>
      </div>
    </footer>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="js/config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/favorites.js"></script>
  <script src="js/kakao.js"></script>
  <script src="js/search.js"></script>
</body>

</html>

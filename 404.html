<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeatherEats | 페이지를 찾을 수 없어요</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/common.css">
  <style>
    .not-found-main {
      align-items: center;
      display: flex;
      min-height: calc(100vh - 160px);
      padding: 32px 0;
    }

    .not-found-card {
      margin: 0 auto;
      max-width: 560px;
      text-align: center;
    }

    .not-found-code {
      color: var(--color-primary-dark);
      font-size: clamp(3rem, 12vw, 5rem);
      font-weight: 700;
      line-height: 1;
      margin-bottom: 12px;
    }

    .not-found-text {
      color: var(--color-text-muted);
      margin: 12px 0 24px;
    }

    .not-found-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    @media (max-width: 767px) {
      .not-found-main {
        min-height: calc(100vh - 220px);
      }

      .not-found-actions {
        flex-direction: column;
      }

      .not-found-actions .button {
        width: 100%;
      }
    }
  </style>
</head>
<body class="theme-default">
  <div class="app-shell">
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html" aria-label="WeatherEats 홈">
          <span class="brand-mark">🍽️</span>
          <span class="brand-text">WeatherEats</span>
        </a>
      </div>
    </header>

    <main class="not-found-main">
      <div class="container">
        <section class="panel not-found-card">
          <p class="section-kicker">Oops!</p>
          <div class="not-found-code">404</div>
          <h1 class="section-title">페이지를 찾을 수 없어요.</h1>
          <p class="not-found-text">주소가 잘못되었거나, 페이지가 이동되었을 수 있어요. 아래 버튼으로 WeatherEats의 주요 화면으로 돌아갈 수 있습니다.</p>
          <div class="not-found-actions">
            <a class="button button-primary" href="index.html">홈으로 가기</a>
            <a class="button button-secondary" href="search.html?keyword=%EB%A7%9B%EC%A7%91">맛집 검색하기</a>
          </div>
        </section>
      </div>
    </main>

    <nav class="mobile-bottom-nav" aria-label="하단 메뉴">
      <a class="mobile-bottom-link" href="index.html">
        <span class="mobile-bottom-icon">🏠</span>
        <span class="mobile-bottom-text">홈</span>
      </a>
      <a class="mobile-bottom-link" href="search.html?keyword=%EB%A7%9B%EC%A7%91">
        <span class="mobile-bottom-icon">🔎</span>
        <span class="mobile-bottom-text">검색</span>
      </a>
      <a class="mobile-bottom-link" href="favorites.html">
        <span class="mobile-bottom-icon">⭐</span>
        <span class="mobile-bottom-text">저장</span>
      </a>
    </nav>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p>© 2026 WeatherEats</p>
        <a href="https://tmdry4530.github.io/kosta-ajax/" target="_blank" rel="noreferrer">GitHub Pages</a>
      </div>
    </footer>
  </div>
</body>
</html>
